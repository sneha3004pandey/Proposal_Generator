kind = "web"
previewPath = "/"
title = "Business Proposal Generator"
version = "1.0.0"
id = "artifacts/proposal-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22676

[services.development]
run = "pnpm --filter @workspace/proposal-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposal-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/proposal-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22676"
BASE_PATH = "/"
